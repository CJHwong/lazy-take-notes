[app]
identifier = "com.cjhwong.lazy-take-notes"
display_name = "Lazy Take Notes"
slug = "lazy-take-notes"
version = "0.1.0"
icons = ["assets/logo.png", "assets/logo.icns"]  # .icns generated by build_desktop.sh

[macos]
binaries = { aarch64 = "dist/lazy-take-notes" }

[gui]
initial_width = 1200
initial_height = 800
resizable = true

[environment]
# TERM: Ghostty sets xterm-ghostty but its terminfo may not be installed;
#       xterm-256color is universally available and Textual handles it correctly.
# LTN_OUTPUT_DIR: sane default for bundled app (not the bundle's internal cwd).
variables = { LTN_OUTPUT_DIR = "~/Documents/LazyTakeNotes", TERM = "xterm-256color", TEXTUAL_DRIVER = "lazy_take_notes.l4_frameworks_and_drivers.drivers.ghostty_driver:GhosttyDriver", LTN_KIOSK = "1" }

[ghostty]
font-size = 14
title = "Lazy Take Notes"
